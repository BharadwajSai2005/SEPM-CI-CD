name: Heart Disease ML CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install flake8 black
      - run: black --check src/ tests/
      - run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503

  pipeline:
    name: Full ML Pipeline
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Heart Disease dataset
        run: |
          mkdir -p data
          curl -sL "https://archive.ics.uci.edu/ml/machine-learning-databases/heart-disease/processed.cleveland.data" \
            -o data/heart.csv
          echo "[OK] Dataset downloaded: $(wc -l < data/heart.csv) rows"

      - name: Preprocess & validate data
        run: python src/preprocess.py

      - name: Run data tests
        run: pytest tests/test_data.py -v --tb=short

      - name: Train models (MLflow)
        run: python src/train.py

      - name: Quality gate — AUC + recall check
        run: python src/evaluate.py

      - name: Run model tests
        run: pytest tests/test_model.py -v --tb=short

      - name: Run API integration tests
        run: pytest tests/test_api.py -v --tb=short

      - name: Run drift monitoring tests
        run: pytest tests/test_drift.py -v --tb=short

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-artifacts
          path: |
            models/
            reports/
          retention-days: 30

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: heart-disease-artifacts

      - name: Build Docker image
        run: |
          docker build -t heart-disease-api:${{ github.sha }} .
          docker run --rm -d -p 8000:8000 \
            --name hd-api heart-disease-api:${{ github.sha }}
          sleep 5

      - name: Smoke test container
        run: |
          curl -sf http://localhost:8000/health | python -c \
            "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"

          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":0,"trestbps":145,"chol":233,
                 "fbs":1,"restecg":0,"thalach":150,"exang":0,
                 "oldpeak":2.3,"slope":0,"ca":0,"thal":1}' \
            | python -c "import sys,json; d=json.load(sys.stdin); \
                assert d['prediction'] in ['disease','no disease']"

          docker stop hd-api